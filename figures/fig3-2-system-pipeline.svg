  <image href="intermediate/robot_bs.png" x="1304" y="370" width="164" height="72" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-b)"/>
  <text x="1387" y="466" text-anchor="middle" class="math">B_c=B∞(1-exp(-β_c^B z))</text>

