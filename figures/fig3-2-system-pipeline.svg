<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #17212b; }
      .region-title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #21313f; }
      .label { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #1d2a35; }
      .small { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 17px; fill: #344452; }
      .tiny { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 15px; fill: #465765; }
      .math { font-family: "Times New Roman", "Microsoft YaHei", serif; font-size: 19px; fill: #1c2a35; }
      .chip { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #263747; }
      .panel { fill: #ffffff; stroke-width: 3; rx: 18; ry: 18; }
      .region { fill-opacity: 0.34; stroke-width: 3.2; stroke-dasharray: 12 8; rx: 22; ry: 22; }
      .arrow { fill: none; stroke: #2b3b45; stroke-width: 4; marker-end: url(#arrow-dark); }
      .green-arrow { fill: none; stroke: #3d8b55; stroke-width: 4.5; marker-end: url(#arrow-green); }
      .blue-dash { fill: none; stroke: #2f87c8; stroke-width: 4; stroke-dasharray: 10 8; marker-end: url(#arrow-blue); }
      .red-dash { fill: none; stroke: #c84a4a; stroke-width: 4; stroke-dasharray: 10 8; marker-end: url(#arrow-red); }
    </style>

    <marker id="arrow-dark" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 Z" fill="#2b3b45"/>
    </marker>
    <marker id="arrow-green" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 Z" fill="#3d8b55"/>
    </marker>
    <marker id="arrow-blue" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 Z" fill="#2f87c8"/>
    </marker>
    <marker id="arrow-red" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M1,1 L12,6.5 L1,12 Z" fill="#c84a4a"/>
    </marker>

    <linearGradient id="alpha-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="52%" stop-color="#7f8b93" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1f2930" stop-opacity="0.22"/>
    </linearGradient>

